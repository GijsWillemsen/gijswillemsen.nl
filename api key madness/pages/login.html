<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoggyData Login</title>
  <link rel="icon" href="./favicon.ico" type="image/ico">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: #000;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .logo {
      width: 360px;
      margin-bottom: 20px;
    }
    .form-container {
      width: 400px;
      padding: 100px 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      background-color: #fff;
      border: 1px solid #000;
      text-align: center;
    }
    .input-field {
      width: 92%;
      padding: 10px 15px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #000;
      font-size: 16px;
      background-color: #fff;
      color: #000;
    }
    .input-field:focus {
      border-color: #000;
      outline: none;
    }
    .login-button {
      width: 100%;
      padding: 12px 20px;
      background-color: #fff;
      border: 1px solid #000;
      color: #000;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    .login-button:hover {
      background-color: #000;
      color: #fff;
    }
    .message {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
    .message.success {
      color: green;
    }
    .message.error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="./banner.png" alt="SoggyData Logo">
    <div class="form-container">
      <h2>Login</h2>
      <form id="login-form">
        <input type="text" name="username" class="input-field" placeholder="Username" required>
        <input type="password" name="password" class="input-field" placeholder="Password" required>
        <button type="submit" class="login-button">Login</button>
      </form>
      <p id="error-msg" class="message error"></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';

      const username = form.username.value.trim();
      const password = form.password.value;

      if (!username || !password) {
        errorMsg.textContent = 'Please enter username and password';
        return;
      }

      try {
        const res = await fetch('https://soggy-data-api.gijs3-willemsen.workers.dev/api/users');
        if (!res.ok) throw new Error('Failed to fetch users');

        const users = await res.json();

        const user = users.find(u => u.username.toLowerCase() === username.toLowerCase());
        if (!user) {
          errorMsg.textContent = 'Incorrect password or username';
          return;
        }

        if (user.password !== password) {
          errorMsg.textContent = 'Incorrect password or username';
          return;
        }

        // Save token to localStorage
        localStorage.setItem('authToken', `${user.username}-token`);
        localStorage.setItem('username', user.username);

        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = 'Error during login. Try again later.';
        console.error(err);
      }
    });
  </script>
</body>
</html>
