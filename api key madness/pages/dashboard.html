<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoggyData - Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }
    .header {
      background: #2b2bff;
      color: white;
      padding: 1rem;
      text-align: center;
      position: relative;
    }
    .logout-btn {
      position: absolute;
      right: 1rem;
      top: 1rem;
      padding: 0.4rem 1rem;
      background: #fff;
      border: none;
      border-radius: 5px;
      color: #2b2bff;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    .logout-btn:hover {
      background: #e6e6e6;
    }
    .content {
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    h2 {
      color: #333;
    }
    ul {
      list-style: none;
      padding-left: 0;
    }
    li {
      margin-bottom: 0.5rem;
      background: white;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      word-break: break-word;
    }
    .file {
      background: white;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    .file h2 {
      margin-top: 0;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #f9f9f9;
      padding: 0.5rem;
      border-radius: 4px;
      border: 1px solid #ddd;
      overflow-x: auto;
    }
    img {
      max-width: 100%;
      border-radius: 5px;
      margin-top: 0.5rem;
    }
    #error-msg {
      color: red;
      font-weight: bold;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SoggyData Dashboard</h1>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </div>
  <div class="content">
    <h2 id="welcome-msg">Welcome!</h2>
    <h3>Your Files:</h3>
    <div id="files-container">
      <p>Loading files...</p>
    </div>
    <div id="error-msg"></div>
  </div>

  <script>
    const logoutBtn = document.getElementById('logout-btn');
    const filesContainer = document.getElementById('files-container');
    const welcomeMsg = document.getElementById('welcome-msg');
    const errorMsg = document.getElementById('error-msg');

    const FILES_API_BASE = 'https://soggy-data-api-files.gijs3-willemsen.workers.dev';

    const username = localStorage.getItem('username');
    const token = localStorage.getItem('authToken');

    if (!username || !token || token !== `${username}-token`) {
      window.location.href = 'login.html';
    } else {
      welcomeMsg.textContent = `Welcome, ${username}!`;
      fetchFileList();
    }

    logoutBtn.onclick = () => {
      localStorage.clear();
      window.location.href = 'login.html';
    };

    async function fetchFileList() {
      try {
        const res = await fetch(`${FILES_API_BASE}/api/files?user=${username}`, {
          method: 'GET'
        });

        if (!res.ok) {
          throw new Error(`Failed to fetch file list: ${res.statusText}`);
        }

        const files = await res.json();

        if (!files || files.length === 0) {
          filesContainer.innerHTML = '<p>No files found.</p>';
          return;
        }

        filesContainer.innerHTML = '';

        for (const filename of files) {
          await fetchAndDisplayFile(filename);
        }
      } catch (err) {
        errorMsg.textContent = 'Failed to load files. Try again later.';
        console.error(err);
      }
    }

    async function fetchAndDisplayFile(filename) {
      try {
        const res = await fetch(`${FILES_API_BASE}/api/file?user=${username}&file=${encodeURIComponent(filename)}`, {
          method: 'GET'
        });

        if (!res.ok) {
          console.warn(`Failed to fetch file ${filename}: ${res.statusText}`);
          return;
        }

        const contentType = res.headers.get('Content-Type') || '';
        const fileDiv = document.createElement('div');
        fileDiv.className = 'file';

        const title = document.createElement('h2');
        title.textContent = filename;
        fileDiv.appendChild(title);

        if (contentType.startsWith('text/plain')) {
          const text = await res.text();
          const pre = document.createElement('pre');
          pre.textContent = text;
          fileDiv.appendChild(pre);
        } else {
          const blob = await res.blob();
          if (blob.type.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(blob);
            fileDiv.appendChild(img);
          } else {
            const p = document.createElement('p');
            p.textContent = `File type ${blob.type} not supported for preview.`;
            fileDiv.appendChild(p);
          }
        }

        filesContainer.appendChild(fileDiv);
      } catch (err) {
        console.error(`Error loading file ${filename}:`, err);
      }
    }
  </script>
</body>
</html>
