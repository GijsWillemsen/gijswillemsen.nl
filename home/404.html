<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gijs Willemsen | 404</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f9fafb, #f3f4f6);
      color: #1f2937;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4">
  <div class="max-w-screen-md text-center p-8 bg-white shadow-md rounded-xl transition hover:shadow-lg">
    <div class="flex justify-center mb-6">
      <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4 rounded-full shadow-lg">
        <i data-lucide="alert-triangle" class="w-8 h-8"></i>
      </div>
    </div>
    <h1 class="text-5xl font-bold mb-4">404</h1>
    <h2 class="text-2xl font-semibold text-gray-700 mb-4">Page Not Found</h2>
    <p class="text-gray-500 mb-6">
      Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
    </p>
    <a href="/" class="inline-block px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-md shadow-sm transition duration-300">
      ⬅ Back to Home
    </a>
  </div>
  <div class="mt-12 text-center">
    <p class="text-sm font-mono text-white bg-black px-4 py-2 rounded">
      <i data-lucide="terminal" class="inline w-4 h-4 mr-1"></i>
      Lost in cyberspace...
    </p>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
