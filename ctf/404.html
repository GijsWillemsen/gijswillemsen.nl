<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Page Not Found</title>
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(to bottom right, #f9fafb, #f3f4f6);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      color: #1f2937;
    }

    .error-container {
      background: white;
      padding: 3rem 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
      position: relative;
    }

    h1 {
      font-size: 6rem;
      margin-bottom: 0.5rem;
      color: #2563eb;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    p {
      margin-bottom: 2rem;
      color: #4b5563;
    }

    a {
      background: #2563eb;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.3s;
    }

    a:hover {
      background: #1d4ed8;
    }

    .icon {
      font-size: 5rem;
      color: #fbbf24;
      margin-bottom: 1rem;
    }
  </style>

  <!-- You found the flag!!! -->
  <!-- CTF{404_flag_not_found} -->

  <script src="https://cdn.jsdelivr.net/npm/lucide/dist/lucide.min.js"></script>
</head>
<body>
  <div class="error-container" role="main" aria-labelledby="error-title" aria-describedby="error-desc">
    <div class="icon" aria-hidden="true">
      <i data-lucide="alert-triangle"></i>
    </div>
    <h1 id="error-title">404</h1>
    <h2>Page Not Found</h2>
    <p id="error-desc">Sorry, the page you're looking for doesn't exist or has been moved.</p>
    <a href="/" aria-label="Go back to homepage">Go to Homepage</a>
  </div>

  <script>
    if (typeof lucide !== "undefined") {
      lucide.replace();
    }
  </script>
</body>
</html>
